name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan des secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build
      - name: Sauvegarde du cache
        uses: actions/cache/save@v3
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}

  audit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Restauration du cache
        uses: actions/cache/restore@v3
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
      - name: Audit des dépendances
        run: npm audit --audit-level=high --omit=dev

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Restauration du cache
        uses: actions/cache/restore@v3
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
      - run: npm install
      - name: Run ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: [audit, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Restauration du cache
        uses: actions/cache/restore@v3
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
      - run: npm install
      - run: npm run build
      - uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run start
      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

  # deploy:
  #   runs-on: ubuntu-latest
  #   needs: test
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Setup SSH
  #       run: |
  #         mkdir -p ~/.ssh
  #         echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
  #         chmod 600 ~/.ssh/id_rsa
  #         ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
  #     - name: Deploy
  #       run: |
  #         ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
  #           set -e
  #           cd ~/next-cda25
  #           git fetch origin main
  #           git reset --hard origin/main
  #           npm install
  #           npm run build
  #           pm2 restart next-app
  #           pm2 list
  #         "

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ebuaa/next-cda25/next
          tags: |
            type=ref,event=branch,suffix=-latest,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' }}
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: next
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-recette:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_RECETTE }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST_RECETTE }} >> ~/.ssh/known_hosts
      - name: Copie du compose sur le serveur
        run: |
          scp -i ~/.ssh/id_rsa compose.prod.yml \
            ${{ secrets.SSH_USER_RECETTE }}@${{ secrets.SSH_HOST_RECETTE }}:~/compose.prod.yml
      - name: Deploy en recette
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER_RECETTE }}@${{ secrets.SSH_HOST_RECETTE }} \
            "set -e
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '$ACTOR' --password-stdin
            TAG=latest docker compose -f ~/compose.prod.yml up -d --pull always"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Calcul du tag de version (suppression du 'v' préfixe)
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_PROD }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST_PROD }} >> ~/.ssh/known_hosts
      - name: Copie du compose sur le serveur
        run: |
          scp -i ~/.ssh/id_rsa compose.prod.yml \
            ${{ secrets.SSH_USER_PROD }}@${{ secrets.SSH_HOST_PROD }}:~/compose.prod.yml
      - name: Deploy en production
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER_PROD }}@${{ secrets.SSH_HOST_PROD }} \
            "set -e
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '$ACTOR' --password-stdin
            TAG=$TAG docker compose -f ~/compose.prod.yml up -d --pull always"
