on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: ls -lah
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: cypress-io/github-action@v6
    with :
      start : npm run start
      browser : chrome