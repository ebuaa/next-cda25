on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - run: ls -lah
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build
      - name: Sauvegarde du cache
        uses: actions/cache/save@v3
        with: 
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
      - uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run start